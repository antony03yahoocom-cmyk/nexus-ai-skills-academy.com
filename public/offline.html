<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus AI Academy - Offline</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #080a12; color: #f8fafc; padding: 24px; }
      main { max-width: 520px; border: 1px solid rgba(124, 58, 237, .35); border-radius: 24px; padding: 28px; background: rgba(15, 23, 42, .78); box-shadow: 0 24px 80px rgba(0,0,0,.35); }
      h1 { margin: 0 0 12px; font-size: clamp(1.75rem, 5vw, 2.5rem); }
      p { color: #cbd5e1; line-height: 1.7; }
      a, button { display: inline-flex; margin-top: 12px; border: 0; border-radius: 999px; padding: 12px 18px; color: white; background: #7c3aed; font-weight: 700; text-decoration: none; cursor: pointer; }
      .tip { margin-top: 16px; font-size: .9rem; color: #94a3b8; }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Nexus AI Academy saved the app shell for low-data access. Reconnect to Safaricom, Airtel, Wi‑Fi, or another network to load new courses, files, assignments, and messages.</p>
      <button onclick="location.reload()">Try again</button>
      <p class="tip">Tip: revisit important lessons while online first so your browser can cache lightweight assets for later.</p>
    </main>
  </body>
</html>
